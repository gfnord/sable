services:
  # IRC server
  sable-ircd-1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: sable-ircd-1
    hostname: irc.example.com
    ports:
      - "6667:6667"   # Plain text IRC
      - "6697:6697"   # TLS IRC
      - "6668:6668"   # Server-to-server gossip
      - "8888:8888"   # Management API
      - "9999:9999"   # Tokio console (optional, for debugging)
    volumes:
      - ./configs/network.conf:/sable/config/network.conf:ro
      - ./configs/server.conf:/sable/config/server.conf:ro
      - ./configs/network_config.json:/sable/config/network_config.json:ro
      - /data/caddy/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/irc.the14.xyz/irc.the14.xyz.crt:/sable/certs/server.crt:ro
      - /data/caddy/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/irc.the14.xyz/irc.the14.xyz.key:/sable/certs/server.key:ro
      - ./certs/ca_cert.pem:/sable/certs/ca_cert.pem:ro
      - ./certs/client.crt:/sable/certs/client.crt:ro
      - ./certs/client.key:/sable/certs/client.key:ro
      - ./data/ircd:/sable/data
      - ./configs/motd.txt:/sable/config/motd.txt:ro
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - BOOTSTRAP_NETWORK=/sable/config/network_config.json
    networks:
      - sable-net
    depends_on:
      - sable-services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fks", "https://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Services node (NickServ / ChanServ)
  sable-services:
    build:
      context: .
      dockerfile: Dockerfile.services
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: sable-services
    hostname: services.example.com
    ports:
      - "8889:8888"   # Management API (mapped to avoid conflict with ircd)
    volumes:
      - ./configs/network.conf:/sable/config/network.conf:ro
      - ./configs/services.conf:/sable/config/services.conf:ro
      - ./certs/services.crt:/sable/certs/services.crt:ro
      - ./certs/services.key:/sable/certs/services.key:ro
      - ./certs/ca_cert.pem:/sable/certs/ca_cert.pem:ro
      - ./data/services:/sable/data
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      - sable-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fks", "https://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Second IRC server for testing multi-server setup
  # sable-ircd-2:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: sable-ircd-2
  #   hostname: irc2.example.com
  #   ports:
  #     - "7667:6667"
  #     - "7697:6697"
  #     - "7668:6668"
  #     - "8890:8888"
  #   volumes:
  #     - ./configs/network.conf:/sable/config/network.conf:ro
  #     - ./configs/server2.conf:/sable/config/server.conf:ro
  #     - ./configs/network_config.json:/sable/config/network_config.json:ro
  #     - ./certs/server2.pem:/sable/certs/server.crt:ro
  #     - ./certs/server2.key:/sable/certs/server.key:ro
  #     - ./certs/ca_cert.pem:/sable/certs/ca_cert.pem:ro
  #     - ./data/ircd2:/sable/data
  #   environment:
  #     - RUST_LOG=info
  #   networks:
  #     - sable-net
  #   depends_on:
  #     - sable-services
  #     - sable-ircd-1
  #   restart: unless-stopped

networks:
  sable-net:
    driver: bridge

volumes:
  sable-data:
    driver: local
